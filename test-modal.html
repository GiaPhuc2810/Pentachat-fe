<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Modal</title>
  <style>
    :root {
      --primary-color: #0D6EFD;
      --bg-primary: #FFFFFF;
      --text-primary: #212529;
      --text-secondary: #6C757D;
      --border-light: #E9ECEF;
      --bg-hover: #F1F3F5;
      --spacing-lg: 1.5rem;
      --spacing-sm: 0.5rem;
      --radius-lg: 0.75rem;
      --radius-md: 0.5rem;
      --shadow-lg: 0 1rem 3rem rgba(0, 0, 0, 0.175);
      --transition-fast: 150ms ease-in-out;
      --transition-base: 250ms ease-in-out;
      --z-modal-backdrop: 1040;
      --z-modal: 1050;
      --font-size-xl: 1.25rem;
      --font-size-2xl: 1.5rem;
    }

    body {
      font-family: 'Inter', sans-serif;
      padding: 2rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      background-color: var(--primary-color);
      color: white;
      border: none;
      border-radius: var(--radius-md);
      cursor: pointer;
    }

    .modal-backdrop {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.5);
      z-index: var(--z-modal-backdrop);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal {
      position: relative;
      background-color: var(--bg-primary);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      max-width: 500px;
      width: 90%;
      max-height: 90vh;
      overflow: hidden;
      z-index: var(--z-modal);
      animation: fadeIn var(--transition-base);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--spacing-lg);
      border-bottom: 1px solid var(--border-light);
    }

    .modal-title {
      font-size: var(--font-size-xl);
      font-weight: 600;
      margin: 0;
    }

    .modal-close {
      background: none;
      border: none;
      font-size: var(--font-size-2xl);
      color: var(--text-secondary);
      cursor: pointer;
      padding: 0;
      width: 2rem;
      height: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-md);
      transition: background-color var(--transition-fast);
    }

    .modal-close:hover {
      background-color: var(--bg-hover);
    }

    .modal-body {
      padding: var(--spacing-lg);
    }

    .modal-footer {
      display: flex;
      gap: var(--spacing-sm);
      justify-content: flex-end;
      padding: var(--spacing-lg);
      border-top: 1px solid var(--border-light);
    }

    .form-group {
      margin-bottom: var(--spacing-lg);
    }

    .form-label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 500;
    }

    .form-control {
      width: 100%;
      padding: 0.625rem 0.875rem;
      border: 1px solid #DEE2E6;
      border-radius: var(--radius-md);
    }

    .btn-secondary {
      background-color: #6C757D;
    }
  </style>
</head>
<body>
  <h1>Test Modal</h1>
  <button class="btn" id="open-modal-btn">Open Modal</button>

  <!-- Modal -->
  <div class="modal-backdrop" id="test-modal" style="display: none;">
    <div class="modal">
      <div class="modal-header">
        <h5 class="modal-title">Test Modal</h5>
        <button class="modal-close" id="close-modal">&times;</button>
      </div>
      <div class="modal-body">
        <form>
          <div class="form-group">
            <label class="form-label">Test Input</label>
            <input type="text" class="form-control" placeholder="Enter something">
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="cancel-btn">Cancel</button>
        <button class="btn" id="submit-btn">Submit</button>
      </div>
    </div>
  </div>

  <script>
    const modal = document.getElementById('test-modal');
    const openBtn = document.getElementById('open-modal-btn');
    const closeBtn = document.getElementById('close-modal');
    const cancelBtn = document.getElementById('cancel-btn');

    console.log('Modal element:', modal);
    console.log('Open button:', openBtn);

    openBtn.addEventListener('click', () => {
      console.log('Open button clicked!');
      modal.style.display = 'flex';
      console.log('Modal display:', modal.style.display);
    });

    const closeModal = () => {
      console.log('Closing modal');
      modal.style.display = 'none';
    };

    closeBtn.addEventListener('click', closeModal);
    cancelBtn.addEventListener('click', closeModal);

    modal.addEventListener('click', (e) => {
      if (e.target === modal) {
        closeModal();
      }
    });
  </script>
</body>
</html>
